<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Volume — Analytics</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{--bg:#121010;--bg2:#171412;--card:#1A1715;--border:rgba(255,92,0,0.18);--accent:#FF5C00;--accent2:#FF8A3D;--green:#3ECF7A;--yellow:#FFB020;--red:#FF6157;--text:#F2EFE8;--inv:#E5E7EB;--muted:#9A9289;--mono:'JetBrains Mono',monospace;--head:'Bebas Neue',sans-serif;--body:'DM Sans',sans-serif;}
*{box-sizing:border-box;margin:0;padding:0;}
html{background:var(--bg);color:var(--inv);font-family:var(--body);font-size:15px;}
body{min-height:100vh;background:radial-gradient(ellipse at 15% 15%,rgba(255,92,0,0.05) 0%,transparent 55%),radial-gradient(ellipse at 85% 85%,rgba(255,138,61,0.05) 0%,transparent 55%),var(--bg);}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:16px 28px;border-bottom:1px solid var(--border);background:rgba(10,15,28,0.92);backdrop-filter:blur(20px);position:sticky;top:0;z-index:100;}
.logo{font-family:var(--head);font-size:26px;letter-spacing:3px;background:linear-gradient(90deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.topbar-r{display:flex;align-items:center;gap:12px;}
.ubtn{display:flex;align-items:center;gap:6px;padding:8px 16px;border-radius:10px;background:rgba(255,92,0,0.1);border:1px solid rgba(255,92,0,0.3);color:var(--accent);font-family:var(--mono);font-size:11px;cursor:pointer;transition:all .2s;}
.ubtn:hover{background:rgba(255,92,0,0.18);}
#csv-input{display:none;}
.dbadge{font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:0.5px;}
.main{padding:22px 28px;max-width:1440px;margin:0 auto;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:14px;}
.g21{display:grid;grid-template-columns:2fr 1fr;gap:14px;margin-bottom:14px;}
.g12{display:grid;grid-template-columns:1fr 2fr;gap:14px;margin-bottom:14px;}
.stats-row{display:grid;grid-template-columns:repeat(7,1fr);gap:10px;margin-bottom:14px;}
.stat{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px 16px;animation:up .4s ease both;}
.stat:nth-child(2){animation-delay:.04s}.stat:nth-child(3){animation-delay:.08s}.stat:nth-child(4){animation-delay:.12s}.stat:nth-child(5){animation-delay:.16s}.stat:nth-child(6){animation-delay:.20s}.stat:nth-child(7){animation-delay:.24s}
.slbl{font-family:var(--mono);font-size:8px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:5px;}
.sval{font-family:var(--head);font-size:30px;letter-spacing:1px;color:var(--accent2);line-height:1;}
.ssub{font-size:9px;color:var(--muted);margin-top:2px;}
.card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:18px 20px;animation:up .5s ease both;}
.ctitle{font-family:var(--head);font-size:17px;letter-spacing:1px;color:var(--text);margin-bottom:1px;}
.csub{font-family:var(--mono);font-size:8px;color:var(--muted);letter-spacing:0.8px;margin-bottom:12px;}
@keyframes up{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
/* COACH */
.coach{background:linear-gradient(135deg,rgba(255,92,0,0.07),rgba(255,138,61,0.1));border:1px solid rgba(255,92,0,0.22);border-radius:18px;padding:18px 20px;margin-bottom:14px;}
.coach-hdr{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.coach-ico{font-size:20px;}
.coach-ttl{font-family:var(--head);font-size:19px;letter-spacing:1px;color:var(--inv);}
.coach-sub{font-family:var(--mono);font-size:8px;color:rgba(229,231,235,0.45);letter-spacing:0.8px;}
.coach-item{display:flex;gap:10px;padding:7px 0;border-bottom:1px solid rgba(255,255,255,0.06);}
.coach-item:last-child{border-bottom:none;}
.coach-bul{font-size:14px;flex-shrink:0;}
.coach-txt{font-size:12px;color:rgba(229,231,235,0.82);line-height:1.6;}
.cem{color:var(--accent);font-weight:600;}
/* READINESS */
.rd-score{font-family:var(--head);font-size:64px;letter-spacing:2px;line-height:1;text-align:center;padding:6px 0;}
.rd-lbl{font-family:var(--mono);font-size:10px;letter-spacing:2px;text-transform:uppercase;text-align:center;margin-bottom:12px;}
.rd-bar{height:7px;border-radius:4px;background:#e5e7eb;overflow:hidden;margin-bottom:3px;}
.rd-fill{height:100%;border-radius:4px;transition:width .8s ease;}
/* SIGNALS */
.sig-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid rgba(0,0,0,0.07);}
.sig-row:last-child{border-bottom:none;}
.sig-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.sig-name{font-size:11px;font-weight:600;color:var(--text);flex:1;}
.sig-det{font-family:var(--mono);font-size:9px;color:var(--muted);}
.sig-act{font-family:var(--mono);font-size:9px;padding:2px 7px;border-radius:5px;white-space:nowrap;}
.s-ready{background:rgba(16,185,129,0.1);color:#059669;}
.s-hold{background:rgba(217,119,6,0.1);color:#b45309;}
.s-back{background:rgba(220,38,38,0.1);color:#b91c1c;}
.s-new{background:rgba(255,138,61,0.1);color:#1d4ed8;}
/* ORM */
.orm-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid rgba(0,0,0,0.07);}
.orm-row:last-child{border-bottom:none;}
.orm-rank{font-family:var(--head);font-size:16px;color:rgba(255,92,0,0.25);width:22px;flex-shrink:0;}
.orm-name{font-size:11px;font-weight:600;color:var(--text);flex:1;}
.orm-bw{width:70px;height:4px;background:#e5e7eb;border-radius:2px;}
.orm-bf{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--accent2),var(--accent));}
.orm-val{font-family:var(--mono);font-size:12px;color:var(--accent2);font-weight:600;width:50px;text-align:right;}
/* RPE */
.rpe-row{display:flex;align-items:center;gap:7px;margin-bottom:6px;}
.rpe-lbl{font-family:var(--mono);font-size:10px;width:16px;text-align:center;flex-shrink:0;}
.rpe-track{flex:1;height:7px;background:#e5e7eb;border-radius:4px;overflow:hidden;}
.rpe-fill{height:100%;border-radius:4px;transition:width .6s ease;}
.rpe-cnt{font-family:var(--mono);font-size:9px;color:var(--muted);width:24px;text-align:right;}
/* RATIO */
.ratio-num{font-family:var(--head);font-size:52px;letter-spacing:2px;line-height:1;text-align:center;}
.ratio-sub{font-family:var(--mono);font-size:9px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;text-align:center;margin-bottom:12px;}
.ratio-bar{display:flex;height:10px;border-radius:5px;overflow:hidden;margin:10px 0 5px;}
.ratio-pull{background:linear-gradient(90deg,var(--accent2),#1d4ed8);}
.ratio-push{background:linear-gradient(90deg,var(--red),#f97316);}
.ratio-leg{display:flex;justify-content:space-between;font-family:var(--mono);font-size:9px;}
/* NOTES */
.note-c{padding:9px 11px;border-radius:9px;background:rgba(255,138,61,0.05);border:1px solid rgba(255,138,61,0.12);margin-bottom:7px;}
.note-m{font-family:var(--mono);font-size:8px;color:var(--muted);margin-bottom:3px;}
.note-t{font-size:11px;color:var(--text);line-height:1.5;}
.nflag{display:inline-block;font-family:var(--mono);font-size:8px;padding:1px 5px;border-radius:4px;margin-left:5px;}
.nf-form{background:rgba(220,38,38,0.1);color:#b91c1c;}
.nf-weight{background:rgba(16,185,129,0.1);color:#059669;}
.nf-general{background:rgba(255,138,61,0.1);color:#1d4ed8;}
/* TABLE */
.fchips{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:10px;}
.fchip{font-family:var(--mono);font-size:9px;padding:3px 8px;border-radius:10px;background:rgba(255,138,61,0.07);border:1px solid rgba(255,138,61,0.15);color:var(--muted);cursor:pointer;transition:all .12s;}
.fchip.on{background:rgba(255,92,0,0.1);border-color:var(--accent);color:var(--accent);}
.stbl{width:100%;border-collapse:collapse;}
.stbl th{font-family:var(--mono);font-size:8px;color:var(--muted);text-transform:uppercase;letter-spacing:0.7px;padding:6px 9px;text-align:left;border-bottom:1px solid rgba(0,0,0,0.1);}
.stbl td{padding:7px 9px;font-size:11px;color:var(--text);border-bottom:1px solid rgba(0,0,0,0.05);}
.stbl tr:hover td{background:rgba(255,138,61,0.03);}
.rpill{display:inline-flex;align-items:center;justify-content:center;width:19px;height:19px;border-radius:5px;font-family:var(--mono);font-size:9px;font-weight:600;}
.ex-sel{background:#fff;border:1px solid #C4C9D4;border-radius:8px;padding:6px 10px;font-family:var(--mono);font-size:11px;color:var(--text);outline:none;width:100%;margin-bottom:10px;cursor:pointer;}
.scroll{max-height:300px;overflow-y:auto;}
.scroll::-webkit-scrollbar{width:3px;}
.scroll::-webkit-scrollbar-thumb{background:rgba(255,92,0,0.25);border-radius:2px;}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 32px;text-align:center;gap:14px;}
.empty-icon{font-size:52px;}.empty-ttl{font-family:var(--head);font-size:34px;letter-spacing:2px;}.empty-sub{font-size:13px;color:var(--muted);line-height:1.7;max-width:360px;}
.empty-btn{display:flex;align-items:center;gap:8px;padding:13px 26px;border-radius:12px;background:linear-gradient(135deg,var(--accent2),#1d4ed8);color:#fff;font-size:14px;font-weight:600;cursor:pointer;border:none;font-family:var(--body);transition:opacity .2s,transform .15s;margin-top:6px;}
.empty-btn:hover{opacity:.9;transform:scale(1.02);}
@media(max-width:1000px){.g2,.g3,.g21,.g12{grid-template-columns:1fr;}.stats-row{grid-template-columns:repeat(4,1fr);}}

/* ── NASM TRAINER REVIEW ─────────────────────────────────────────────────── */
.trainer-panel {
  background: linear-gradient(135deg, rgba(255,92,0,0.04) 0%, rgba(255,138,61,0.07) 100%);
  border: 1px solid rgba(255,92,0,0.2);
  border-radius: 20px;
  padding: 22px 24px;
  margin-bottom: 14px;
  position: relative;
  overflow: hidden;
}
.trainer-panel::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, var(--accent), var(--accent2), transparent);
}
.trainer-hdr {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
  flex-wrap: wrap;
  gap: 10px;
}
.trainer-hdr-left {
  display: flex;
  align-items: center;
  gap: 12px;
}
.trainer-badge {
  background: linear-gradient(135deg, rgba(255,92,0,0.15), rgba(255,138,61,0.15));
  border: 1px solid rgba(255,92,0,0.3);
  border-radius: 10px;
  padding: 8px 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
}
.trainer-title { font-family: var(--head); font-size: 20px; letter-spacing: 1.5px; color: var(--inv); }
.trainer-sub { font-family: var(--mono); font-size: 8px; color: rgba(229,231,235,0.4); letter-spacing: 1px; margin-top: 2px; }
.trainer-btn {
  display: flex; align-items: center; gap: 7px;
  padding: 10px 18px; border-radius: 10px;
  background: linear-gradient(135deg, rgba(255,92,0,0.15), rgba(255,138,61,0.2));
  border: 1px solid rgba(255,92,0,0.35);
  color: var(--accent); font-family: var(--mono); font-size: 11px;
  cursor: pointer; transition: all .2s; white-space: nowrap;
  letter-spacing: 0.5px;
}
.trainer-btn:hover { background: linear-gradient(135deg, rgba(255,92,0,0.25), rgba(255,138,61,0.3)); transform: translateY(-1px); box-shadow: 0 4px 16px rgba(255,92,0,0.15); }
.trainer-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }
.trainer-btn .btn-icon { font-size: 14px; }

.trainer-empty {
  text-align: center; padding: 28px 16px;
  font-size: 12px; color: rgba(229,231,235,0.35);
  font-family: var(--mono); letter-spacing: 0.5px;
}

.trainer-loading {
  display: flex; align-items: center; gap: 12px;
  padding: 20px 0; justify-content: center;
}
.trainer-dots { display: flex; gap: 5px; }
.trainer-dots span {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--accent); opacity: 0.3;
  animation: trainerPulse 1.2s ease-in-out infinite;
}
.trainer-dots span:nth-child(2) { animation-delay: 0.2s; }
.trainer-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes trainerPulse { 0%,100%{opacity:0.2;transform:scale(0.8)} 50%{opacity:1;transform:scale(1.1)} }
.trainer-loading-txt { font-family: var(--mono); font-size: 11px; color: rgba(229,231,235,0.5); letter-spacing: 0.5px; }

.trainer-response { animation: trainerFadeIn 0.5s ease; }
@keyframes trainerFadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

.trainer-section {
  margin-bottom: 14px;
  padding: 14px 16px;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 12px;
}
.trainer-section:last-child { margin-bottom: 0; }
.trainer-section-label {
  font-family: var(--mono); font-size: 8px;
  color: var(--accent); letter-spacing: 1.5px;
  text-transform: uppercase; margin-bottom: 8px;
  display: flex; align-items: center; gap: 6px;
}
.trainer-section-label::after {
  content: ''; flex: 1; height: 1px;
  background: linear-gradient(90deg, rgba(255,92,0,0.2), transparent);
}
.trainer-section-body {
  font-size: 12px; color: rgba(229,231,235,0.82);
  line-height: 1.75;
}
.trainer-section-body strong { color: var(--accent); font-weight: 600; }
.trainer-section-body em { color: rgba(229,231,235,0.55); font-style: normal; }

.trainer-grade {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 4px 12px; border-radius: 20px;
  font-family: var(--head); font-size: 22px; letter-spacing: 2px;
  margin-bottom: 6px;
}
.grade-A { background: rgba(16,185,129,0.12); color: #10b981; border: 1px solid rgba(16,185,129,0.25); }
.grade-B { background: rgba(255,138,61,0.12); color: #3B82F6; border: 1px solid rgba(255,138,61,0.25); }
.grade-C { background: rgba(217,119,6,0.12); color: #d97706; border: 1px solid rgba(217,119,6,0.25); }
.grade-D { background: rgba(220,38,38,0.12); color: #dc2626; border: 1px solid rgba(220,38,38,0.25); }

.trainer-pills {
  display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px;
}
.trainer-pill {
  font-family: var(--mono); font-size: 9px;
  padding: 3px 9px; border-radius: 20px;
}
.pill-good { background: rgba(16,185,129,0.1); color: #10b981; border: 1px solid rgba(16,185,129,0.2); }
.pill-warn { background: rgba(217,119,6,0.1); color: #d97706; border: 1px solid rgba(217,119,6,0.2); }
.pill-alert { background: rgba(220,38,38,0.1); color: #dc2626; border: 1px solid rgba(220,38,38,0.2); }
.pill-info { background: rgba(255,138,61,0.1); color: #3B82F6; border: 1px solid rgba(255,138,61,0.2); }

.trainer-timestamp {
  font-family: var(--mono); font-size: 8px;
  color: rgba(229,231,235,0.2); margin-top: 12px;
  text-align: right; letter-spacing: 0.5px;
}
.trainer-error {
  padding: 14px; border-radius: 10px;
  background: rgba(220,38,38,0.07); border: 1px solid rgba(220,38,38,0.2);
  font-family: var(--mono); font-size: 11px; color: #dc2626;
  display: flex; align-items: center; gap: 8px;
}

</style>
</head>
<body>
<header class="topbar">
  <div class="logo">Volume — Analytics</div>
  <div class="topbar-r">
    <div class="dbadge" id="date-range">No data</div>
    <label class="ubtn" for="csv-input">↑ Load CSV</label>
    <input type="file" id="csv-input" accept=".csv">
  </div>
</header>
<div class="main">
  <div id="es" class="empty">
    <div class="empty-icon">📊</div>
    <div class="empty-ttl">Analytics Dashboard</div>
    <div class="empty-sub">Upload your Volume CSV export to get progression signals, readiness scores, 1RM estimates, RPE analysis, and AI coaching insights.</div>
    <label class="empty-btn" for="csv-input">↑ Load your CSV export</label>
  </div>
  <div id="dash" style="display:none;"></div>
</div>
<script>
let R=[],C={};
const MUSCLE_MAP={'Barbell Bench Press':'Chest','Incline Dumbbell Press':'Chest','Cable Fly':'Chest','Push-Up':'Chest','Weighted Dips':'Chest','Dips':'Chest','Conventional Deadlift':'Back','Pull-Up / Lat Pulldown':'Back','Cable Seated Row':'Back','Dumbbell Row':'Back','Lat Pulldown':'Back','Face Pull':'Shoulders','Overhead Press':'Shoulders','Lateral Raise':'Shoulders','Rear Delt Fly':'Shoulders','Back Squat':'Legs','Romanian Deadlift':'Legs','Leg Press':'Legs','Lying Leg Curl':'Legs','Goblet Squat':'Legs','Dumbbell Lunge':'Legs','Single-Leg RDL':'Legs','Hip Thrust':'Legs','Single-Leg Hip Thrust':'Legs','Nordic Hamstring Curl':'Legs','Hammer Curl':'Arms','Barbell Curl':'Arms','Tricep Pushdown':'Arms','Skull Crusher (EZ Bar)':'Arms','Dead Bug':'Core','Plank Hold (sec)':'Core','Pallof Press':'Core','Ab Wheel Rollout':'Core','Depth Jump':'Power','Lateral Hurdle Hop':'Power','Standing Broad Jump':'Power','Box Jump':'Power','Jump Squat':'Power','Lateral Bound':'Power','Skater Squat':'Power','Skating Position Isometric':'Power'};
const PUSH=['Barbell Bench Press','Incline Dumbbell Press','Cable Fly','Push-Up','Weighted Dips','Dips','Overhead Press','Lateral Raise','Rear Delt Fly','Tricep Pushdown','Skull Crusher (EZ Bar)'];
const PULL=['Conventional Deadlift','Pull-Up / Lat Pulldown','Cable Seated Row','Dumbbell Row','Lat Pulldown','Face Pull','Hammer Curl','Barbell Curl'];

function pf(v){const n=parseFloat(v);return isNaN(n)?0:n;}
function epley(w,r){return r===1?w:w*(1+r/30);}
function fv(v){if(v>=1e6)return(v/1e6).toFixed(1)+'M';if(v>=1000)return(v/1000).toFixed(1)+'K';return v.toFixed(0);}
function ss(n){return(n||'').replace(/PPL \+ Drive Phase - /,'').replace(/Intermediate PPL \+ Drive Phase - /,'').replace(/Intermediate /,'');}
function dates(){return[...new Set(R.map(r=>r['Workout Date']))].sort();}
function exes(){return[...new Set(R.map(r=>r['Exercise']))].filter(Boolean).sort();}
function sessions(){return[...new Set(R.map(r=>r['Workout Date']+'|'+r['Workout Name']))];}

document.getElementById('csv-input').addEventListener('change',function(e){
  const f=e.target.files[0];if(!f)return;
  Papa.parse(f,{header:true,skipEmptyLines:true,complete:({data})=>{R=data.filter(r=>r['Workout Date']);render();}});
});

function volBySession(){const m={};R.forEach(r=>{const k=r['Workout Date'];if(!m[k])m[k]=0;m[k]+=pf(r['Weight'])*pf(r['Reps']);});return m;}
function maxWPerSession(ex){const m={};R.filter(r=>r['Exercise']===ex&&pf(r['Weight'])>0).forEach(r=>{const d=r['Workout Date'];if(!m[d]||pf(r['Weight'])>m[d])m[d]=pf(r['Weight']);});return m;}
function ormPerSession(ex){const m={};R.filter(r=>r['Exercise']===ex&&pf(r['Weight'])>0&&pf(r['Reps'])>0).forEach(r=>{const d=r['Workout Date'];const e=epley(pf(r['Weight']),pf(r['Reps']));if(!m[d]||e>m[d])m[d]=e;});return m;}

function avgRpeMap(){const m={};R.forEach(r=>{if(!pf(r['RPE']))return;if(!m[r['Exercise']])m[r['Exercise']]=[];m[r['Exercise']].push(pf(r['RPE']));});const o={};Object.entries(m).forEach(([k,v])=>o[k]=v.reduce((a,b)=>a+b,0)/v.length);return o;}

function progressionSignals(){
  const rpeM=avgRpeMap();const sigs=[];
  exes().forEach(ex=>{
    const wr=R.filter(r=>r['Exercise']===ex&&pf(r['Weight'])>0&&pf(r['Reps'])>0);
    if(!wr.length)return;
    const byD={};wr.forEach(r=>{const d=r['Workout Date'];const vol=pf(r['Weight'])*pf(r['Reps']);if(!byD[d]||vol>byD[d].vol)byD[d]={weight:pf(r['Weight']),reps:pf(r['Reps']),vol};});
    const sdates=Object.keys(byD).sort();if(!sdates.length)return;
    const avgRpe=rpeM[ex]||0;const maxW=Math.max(...wr.map(r=>pf(r['Weight'])));
    const formNote=R.some(r=>r['Exercise']===ex&&r['Notes']&&(r['Notes'].toLowerCase().includes('form')||r['Notes'].toLowerCase().includes('back')||r['Notes'].toLowerCase().includes('rounding')||r['Notes'].toLowerCase().includes('decreased')));
    let sig,act;
    if(formNote){sig='back';act='↓ Form flagged';}
    else if(avgRpe>0&&avgRpe<=6.5){sig='ready';act='↑ Increase weight';}
    else if(avgRpe>6.5&&avgRpe<=8){sig='hold';act='⟳ 1 more session';}
    else if(avgRpe>8){sig='back';act='↓ Check load';}
    else{sig='new';act='Log more sets';}
    sigs.push({ex,maxW,avgRpe,sig,act,sessions:sdates.length});
  });
  return sigs.sort((a,b)=>b.sessions-a.sessions);
}

function readiness(){
  const ds=dates();if(!ds.length)return{score:50,avgRpe:0,trend:'stable'};
  const now=new Date(ds[ds.length-1]+'T12:00:00');
  const l7=R.filter(r=>{const d=new Date(r['Workout Date']+'T12:00:00');return(now-d)/86400000<=7&&pf(r['RPE'])>0;});
  const p7=R.filter(r=>{const d=new Date(r['Workout Date']+'T12:00:00');const diff=(now-d)/86400000;return diff>7&&diff<=14&&pf(r['RPE'])>0;});
  const aL=l7.length?l7.reduce((s,r)=>s+pf(r['RPE']),0)/l7.length:0;
  const aP=p7.length?p7.reduce((s,r)=>s+pf(r['RPE']),0)/p7.length:0;
  const score=aL>0?Math.max(0,Math.min(100,Math.round((10-aL)/10*100))):50;
  const trend=aP>0?(aL<aP?'improving':aL>aP?'declining':'stable'):'stable';
  return{score,avgRpe:aL.toFixed(1),trend};
}

function ratio(){
  let pull=0,push=0;
  R.forEach(r=>{if(PUSH.includes(r['Exercise']))push++;else if(PULL.includes(r['Exercise']))pull++;});
  const tot=pull+push;
  return{pull,push,ratio:push>0?(pull/push).toFixed(2):0,pullPct:tot?Math.round(pull/tot*100):0,pushPct:tot?Math.round(push/tot*100):0};
}

function coachInsights(){
  const sigs=progressionSignals();
  const rd=readiness();
  const r=ratio();
  const items=[];
  if(rd.avgRpe>0){
    if(rd.score>=70)items.push({i:'🟢',t:`Your avg RPE of <em class="cem">${rd.avgRpe}</em> is in a good zone — body is handling load well. Good window to push progressive overload on ready exercises.`});
    else if(rd.score>=50)items.push({i:'🟡',t:`Avg RPE <em class="cem">${rd.avgRpe}</em> indicates moderate fatigue. Prioritise sleep and protein before attempting weight increases.`});
    else items.push({i:'🔴',t:`Avg RPE <em class="cem">${rd.avgRpe}</em> is high. Consider a deload — reduce volume 30–40% and focus on movement quality this week.`});
  }
  const ready=sigs.filter(s=>s.sig==='ready');
  if(ready.length){const names=ready.slice(0,3).map(s=>`<em class="cem">${s.ex}</em>`).join(', ');items.push({i:'⬆️',t:`${ready.length} exercise${ready.length>1?'s':''} ready to increase: ${names}. RPE consistently below 6.5 — add one increment next session.`});}
  const back=sigs.filter(s=>s.sig==='back');
  if(back.length){const names=back.slice(0,2).map(s=>`<em class="cem">${s.ex}</em>`).join(', ');items.push({i:'⚠️',t:`Form or weight adjustment flagged on ${names}. Do not increase until 2 consecutive clean sessions with no notes.`});}
  const rv=parseFloat(r.ratio);
  if(rv>0){
    if(rv>=1.2&&rv<=1.8)items.push({i:'⚖️',t:`Pull:Push ratio <em class="cem">${r.ratio}:1</em> is ideal for shoulder health. Maintain this balance as you add volume.`});
    else if(rv<1.2)items.push({i:'⚠️',t:`Pull:Push ratio <em class="cem">${r.ratio}:1</em> — too much pushing. Add a set of rows or face pulls each session to protect shoulder joint health.`});
  }
  const ds=dates();
  if(ds.length>=2){const span=(new Date(ds[ds.length-1])-new Date(ds[0]))/86400000+1;const freq=(sessions().length/span*7).toFixed(1);items.push({i:'📅',t:`Training frequency: <em class="cem">${freq} sessions/week</em>. Your PPL + Drive Phase target is 6 — keep building toward that cadence.`});}
  return items;
}

function flagNote(n){const l=n.toLowerCase();if(['form','rounding','back','lean','technique','wrong'].some(k=>l.includes(k)))return['form','⚠️ Form'];if(['increased','decreased','too much','dropped','raised','added','weight'].some(k=>l.includes(k)))return['weight','⚖️ Weight'];return['general','💬 Note'];}

function buildTrainerDataSummary() {
  // Compile a structured data summary to send to Claude
  const ds = dates();
  const totalSessions = sessions().length;
  const totalSets = R.length;
  const span = ds.length >= 2
    ? Math.round((new Date(ds[ds.length-1]) - new Date(ds[0])) / 86400000) + 1
    : 1;
  const weeksTracked = (span / 7).toFixed(1);
  const freq = (totalSessions / (span / 7)).toFixed(1);

  // Volume by muscle group
  const muscleVol = {};
  R.forEach(r => {
    const m = MUSCLE_MAP[r['Exercise']] || 'Other';
    muscleVol[m] = (muscleVol[m] || 0) + pf(r['Weight']) * pf(r['Reps']);
  });

  // Sets by muscle group
  const muscleSets = {};
  R.forEach(r => {
    const m = MUSCLE_MAP[r['Exercise']] || 'Other';
    muscleSets[m] = (muscleSets[m] || 0) + 1;
  });

  // RPE breakdown
  const rpeAll = R.filter(r => pf(r['RPE']) > 0).map(r => pf(r['RPE']));
  const avgRpeVal = rpeAll.length
    ? (rpeAll.reduce((a,b) => a+b, 0) / rpeAll.length).toFixed(1) : null;
  const rpeHigh = rpeAll.filter(r => r >= 9).length;
  const rpeLow  = rpeAll.filter(r => r <= 5).length;

  // Progression signals
  const sigs = progressionSignals();
  const readyExs  = sigs.filter(s => s.sig === 'ready').map(s => s.ex);
  const backOffExs = sigs.filter(s => s.sig === 'back').map(s => s.ex);
  const holdExs   = sigs.filter(s => s.sig === 'hold').map(s => s.ex);

  // 1RM estimates for top exercises
  const orms = {};
  R.filter(r => pf(r['Weight']) > 0 && pf(r['Reps']) > 0).forEach(r => {
    const e = epley(pf(r['Weight']), pf(r['Reps']));
    if (!orms[r['Exercise']] || e > orms[r['Exercise']]) orms[r['Exercise']] = e;
  });
  const topOrms = Object.entries(orms)
    .sort((a,b) => b[1]-a[1])
    .slice(0, 8)
    .map(([ex, val]) => `${ex}: ${Math.round(val)}lbs`);

  // Pull:Push ratio
  const rt = ratio();

  // Recent trend (last 2 weeks vs previous 2 weeks)
  const now = ds.length ? new Date(ds[ds.length-1] + 'T12:00:00') : new Date();
  const last2wk = R.filter(r => (now - new Date(r['Workout Date'] + 'T12:00:00')) / 86400000 <= 14);
  const prev2wk = R.filter(r => {
    const d = (now - new Date(r['Workout Date'] + 'T12:00:00')) / 86400000;
    return d > 14 && d <= 28;
  });
  const last2wkVol = last2wk.reduce((s,r) => s + pf(r['Weight']) * pf(r['Reps']), 0);
  const prev2wkVol = prev2wk.reduce((s,r) => s + pf(r['Weight']) * pf(r['Reps']), 0);
  const volTrend = prev2wkVol > 0
    ? ((last2wkVol - prev2wkVol) / prev2wkVol * 100).toFixed(0) : null;

  // Notes with form flags
  const formFlags = R.filter(r => r['Notes'] && ['form','rounding','back','technique','pain','hurt'].some(k => r['Notes'].toLowerCase().includes(k)));

  // Most trained exercises by frequency
  const exFreq = {};
  R.forEach(r => { exFreq[r['Exercise']] = (exFreq[r['Exercise']] || 0) + 1; });
  const topExs = Object.entries(exFreq).sort((a,b) => b[1]-a[1]).slice(0,10).map(([ex,n]) => `${ex} (${n} sets)`);

  return {
    overview: {
      sessions: totalSessions,
      totalSets,
      weeksTracked,
      avgFrequency: freq,
      dateRange: ds.length ? `${ds[0]} to ${ds[ds.length-1]}` : 'unknown',
    },
    volume: {
      byMuscle: muscleVol,
      setsByMuscle: muscleSets,
      trend2wk: volTrend ? `${volTrend > 0 ? '+' : ''}${volTrend}% vs previous 2 weeks` : 'insufficient data',
    },
    intensity: {
      avgRpe: avgRpeVal,
      highRpeSets: rpeHigh,
      lowRpeSets: rpeLow,
      totalRpeLogged: rpeAll.length,
    },
    progression: {
      readyToIncrease: readyExs,
      backOff: backOffExs,
      hold: holdExs,
    },
    strength: {
      top1RMs: topOrms,
      topExercises: topExs,
    },
    balance: {
      pullPushRatio: rt.ratio,
      pullSets: rt.pull,
      pushSets: rt.push,
    },
    flags: {
      formNotes: formFlags.length,
      formExercises: [...new Set(formFlags.map(r => r['Exercise']))],
    },
  };
}

function buildTrainerPrompt(data) {
  return `You are a NASM-certified personal trainer with 25 years of experience. You are reviewing a client's workout log data from the Volume app and providing a professional training review.

Here is the client's training data summary:

OVERVIEW
- Sessions logged: ${data.overview.sessions}
- Total sets: ${data.overview.totalSets}
- Training period: ${data.overview.dateRange} (${data.overview.weeksTracked} weeks)
- Average frequency: ${data.overview.avgFrequency} sessions/week

VOLUME BY MUSCLE GROUP (sets)
${Object.entries(data.volume.setsByMuscle).map(([m,s]) => `- ${m}: ${s} sets`).join('\n')}
Volume trend: ${data.volume.trend2wk}

INTENSITY (RPE)
- Average RPE: ${data.intensity.avgRpe || 'not logged'}
- High effort sets (RPE 9-10): ${data.intensity.highRpeSets}
- Low effort sets (RPE 1-5): ${data.intensity.lowRpeSets}
- Total RPE logged: ${data.intensity.totalRpeLogged} of ${data.overview.totalSets} sets

PROGRESSION SIGNALS
- Ready to increase weight: ${data.progression.readyToIncrease.join(', ') || 'none'}
- Back off / form flagged: ${data.progression.backOff.join(', ') || 'none'}
- Hold / need more data: ${data.progression.hold.join(', ') || 'none'}

TOP ESTIMATED 1RM (Epley formula)
${data.strength.top1RMs.join('\n')}

MOST TRAINED EXERCISES
${data.strength.topExercises.join('\n')}

PUSH:PULL BALANCE
- Ratio: ${data.balance.pullPushRatio}:1 (pull:push)
- Pull sets: ${data.balance.pullSets} | Push sets: ${data.balance.pushSets}
- NASM target: 1.2–1.8:1

FORM FLAGS
- Sets with form notes: ${data.flags.formNotes}
- Exercises flagged: ${data.flags.formExercises.join(', ') || 'none'}

Based on this data, provide a professional NASM trainer review. Your response MUST be valid JSON with exactly this structure — no markdown, no preamble, just the JSON object:

{
  "overallGrade": "A" | "B" | "C" | "D",
  "gradeReason": "one concise sentence explaining the grade",
  "strengths": ["strength 1", "strength 2", "strength 3"],
  "concerns": ["concern 1", "concern 2"],
  "weeklyPrescription": "specific, actionable plan for the next 7 days written as a trainer talking directly to client",
  "progressionTargets": ["specific exercise: specific action", "specific exercise: specific action", "specific exercise: specific action"],
  "recoveryAssessment": "assessment of recovery, fatigue, and readiness based on RPE data",
  "injuryRiskFlags": ["flag 1 if any"] or [],
  "longTermFocus": "3-sentence strategic recommendation for the next 4-8 weeks",
  "trainerNote": "one personal, direct message from trainer to client — honest, motivating, no fluff"
}`;
}

async function generateTrainerReview() {
  const btn = document.getElementById('trainer-btn');
  const body = document.getElementById('trainer-body');
  const btnTxt = document.getElementById('trainer-btn-txt');

  btn.disabled = true;
  btnTxt.textContent = 'Analysing...';

  body.innerHTML = `
    <div class="trainer-loading">
      <div class="trainer-dots">
        <span></span><span></span><span></span>
      </div>
      <div class="trainer-loading-txt">Reviewing your training data...</div>
    </div>`;

  try {
    const data = buildTrainerDataSummary();
    const prompt = buildTrainerPrompt(data);

    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: 'You are a NASM-certified personal trainer with 25 years of experience. You respond only with valid JSON — no markdown fences, no preamble, no explanation. Just the raw JSON object.',
        messages: [{ role: 'user', content: prompt }],
      }),
    });

    if (!response.ok) throw new Error(`API error ${response.status}`);

    const apiData = await response.json();
    const raw = apiData.content?.find(b => b.type === 'text')?.text || '';

    let review;
    try {
      const cleaned = raw.replace(/^```json\s*/,'').replace(/\s*```$/,'').trim();
      review = JSON.parse(cleaned);
    } catch(e) {
      throw new Error('Could not parse trainer response. Please try again.');
    }

    renderTrainerReview(review);

  } catch(err) {
    body.innerHTML = `<div class="trainer-error">⚠️ ${err.message || 'Something went wrong. Please try again.'}</div>`;
  } finally {
    btn.disabled = false;
    btnTxt.textContent = 'Refresh Review';
  }
}

function renderTrainerReview(r) {
  const gradeClass = `grade-${r.overallGrade || 'B'}`;
  const now = new Date().toLocaleString('en-US', { month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' });

  const strengthsHtml = (r.strengths || []).map(s =>
    `<div style="display:flex;gap:8px;margin-bottom:5px;"><span style="color:var(--green);flex-shrink:0;">✓</span><span>${s}</span></div>`
  ).join('');

  const concernsHtml = (r.concerns || []).map(c =>
    `<div style="display:flex;gap:8px;margin-bottom:5px;"><span style="color:var(--yellow);flex-shrink:0;">⚠</span><span>${c}</span></div>`
  ).join('');

  const targetsHtml = (r.progressionTargets || []).map(t =>
    `<div style="display:flex;gap:8px;margin-bottom:5px;"><span style="color:var(--accent);flex-shrink:0;">→</span><span>${t}</span></div>`
  ).join('');

  const injuryHtml = (r.injuryRiskFlags || []).length
    ? (r.injuryRiskFlags.map(f =>
        `<div style="display:flex;gap:8px;margin-bottom:5px;"><span style="color:var(--red);flex-shrink:0;">🚩</span><span>${f}</span></div>`
      ).join(''))
    : `<div style="color:rgba(16,185,129,0.7);font-size:11px;">✓ No injury risk flags identified</div>`;

  const body = document.getElementById('trainer-body');
  body.innerHTML = `
    <div class="trainer-response">

      <div class="trainer-section">
        <div class="trainer-section-label">📊 Overall Assessment</div>
        <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
          <div class="trainer-grade ${gradeClass}">${r.overallGrade || 'B'}</div>
          <div class="trainer-section-body">${r.gradeReason || ''}</div>
        </div>
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;">
        <div class="trainer-section" style="margin-bottom:0;">
          <div class="trainer-section-label">💪 Strengths</div>
          <div class="trainer-section-body">${strengthsHtml}</div>
        </div>
        <div class="trainer-section" style="margin-bottom:0;">
          <div class="trainer-section-label">⚠️ Concerns</div>
          <div class="trainer-section-body">${concernsHtml}</div>
        </div>
      </div>

      <div class="trainer-section">
        <div class="trainer-section-label">📅 This Week's Prescription</div>
        <div class="trainer-section-body">${r.weeklyPrescription || ''}</div>
      </div>

      <div class="trainer-section">
        <div class="trainer-section-label">🎯 Progression Targets</div>
        <div class="trainer-section-body">${targetsHtml}</div>
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;">
        <div class="trainer-section" style="margin-bottom:0;">
          <div class="trainer-section-label">😴 Recovery Assessment</div>
          <div class="trainer-section-body">${r.recoveryAssessment || ''}</div>
        </div>
        <div class="trainer-section" style="margin-bottom:0;">
          <div class="trainer-section-label">🚩 Injury Risk Flags</div>
          <div class="trainer-section-body">${injuryHtml}</div>
        </div>
      </div>

      <div class="trainer-section">
        <div class="trainer-section-label">🗺️ 4–8 Week Strategy</div>
        <div class="trainer-section-body">${r.longTermFocus || ''}</div>
      </div>

      <div class="trainer-section" style="background:rgba(255,92,0,0.04);border-color:rgba(255,92,0,0.15);">
        <div class="trainer-section-label">🏋️ Trainer's Note</div>
        <div class="trainer-section-body" style="font-style:italic;color:rgba(229,231,235,0.9);font-size:13px;line-height:1.8;">"${r.trainerNote || ''}"</div>
      </div>

      <div class="trainer-timestamp">Generated ${now} · NASM 25yr · Powered by Claude</div>
    </div>`;
}

// Clean callback pattern — no monkey-patching
// onDataLoaded() is called by render() at the end via the hook below
function onDataLoaded() {
  const btn = document.getElementById('trainer-btn');
  const btnTxt = document.getElementById('trainer-btn-txt');
  if (btn) { btn.disabled = false; }
  if (btnTxt) { btnTxt.textContent = 'Generate Review'; }
  const body = document.getElementById('trainer-body');
  if (body && body.querySelector('.trainer-response')) {
    body.innerHTML = '<div class="trainer-empty">New data loaded — click Generate Review for updated analysis</div>';
  }
}

window.generateTrainerReview = generateTrainerReview;

</script>
</body>
</html>
